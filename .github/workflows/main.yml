name: Gerar APK Ndj-lib Reborn
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Recomendado para versões mais novas do Capacitor

      - name: Instalar Dependências
        run: |
          npm install
          npm install @capacitor/android @capacitor/core @capacitor/cli
          # Instala ferramenta de assets apenas se necessário
          if [ -f "icon.png" ]; then npm install @capacitor/assets; fi

      - name: Construir Projeto Web
        run: |
          # Garante que a pasta www existe (essencial para o Capacitor)
          mkdir -p www
          # Se você não usa um framework (React/Vue), o Capacitor lê direto da www

      - name: Configurar Android e Permissões
        run: |
          npx cap add android || true
          
          # Gerar ícones se a imagem existir
          if [ -f "icon.png" ]; then
            npx capacitor-assets generate --android
          fi

          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          # Adiciona permissões de forma segura (verifica se já existe antes de adicionar)
          grep -q "android.permission.INTERNET" $MANIFEST || sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          grep -q "android.permission.ACCESS_NETWORK_STATE" $MANIFEST || sed -i '/<application/i \    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' $MANIFEST
          
          # IMPORTANTE PARA NAVEGADORES: Permitir tráfego de texto claro (http)
          sed -i 's/android:supportsRtl="true">/android:supportsRtl="true" android:usesCleartextTraffic="true">/' $MANIFEST

          npx cap sync

      - name: Compilar APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: ndj-reborn-apk
          path: android/app/build/outputs/apk/debug/*.apk
          
