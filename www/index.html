<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NDJ Reborn - Ultra Secure</title>
    <style>
        :root {
            --primary-blue: #3b82f6;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-heavy: rgba(0, 0, 0, 0.9);
            --text-white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* Fundo com imagem via URL */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-white);
            overflow: hidden;
        }

        /* Botão de Configurações (Topo Direito) */
        .settings-trigger {
            position: absolute;
            top: 25px;
            right: 25px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 18px;
            font-size: 24px;
            cursor: pointer;
            z-index: 1000;
        }

        /* Branding e Logo Pulsante */
        .branding {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 22px;
            margin-bottom: 15px;
            animation: pulse 3s infinite ease-in-out;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 35px rgba(59, 130, 246, 0.8); }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .branding h1 {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Barra de Pesquisa e Atalhos */
        .main-container {
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            padding: 6px 10px;
            border-radius: 50px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.3s;
        }

        #url-input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            padding: 12px 15px;
            font-size: 16px;
            outline: none;
        }

        .search-btn {
            background: var(--primary-blue);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            animation: btn-pop 0.3s ease-out;
        }

        @keyframes btn-pop { 0% { scale: 0.5; } 100% { scale: 1; } }

        .shortcuts {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .shortcut-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .icon-circle {
            width: 55px;
            height: 55px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Barra de Navegação Inferior */
        .bottom-nav {
            position: fixed;
            bottom: 25px;
            display: flex;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(15px);
            padding: 12px 30px;
            border-radius: 40px;
            gap: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        .nav-item { font-size: 24px; cursor: pointer; }

        /* Modal de Configurações */
        #settings-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--glass-heavy);
            backdrop-filter: blur(20px);
            z-index: 2000;
            padding: 40px 25px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 20px;
        }

        /* Interruptor / Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px; width: 20px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--primary-blue); }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body>

    <div class="settings-trigger" onclick="toggleModal(true)">🔐</div>

    <div class="branding">
        <img src="https://cdn-icons-png.flaticon.com/512/64/64571.png" class="logo-img">
        <h1>Seu Navegador Seguro</h1>
    </div>

    <div class="main-container">
        <div class="search-box">
            <input type="text" id="url-input" placeholder="Pesquisar ou digitar URL..." onkeydown="checkEnter(event)">
            <button class="search-btn" onclick="navigate()">➔</button>
        </div>

        <div class="shortcuts">
            <div class="shortcut-item" onclick="quickNav('https://google.com')">
                <div class="icon-circle">🌐</div>
                <span style="font-size:12px; opacity:0.8;">Google</span>
            </div>
            <div class="shortcut-item" onclick="quickNav('https://youtube.com')">
                <div class="icon-circle">▶️</div>
                <span style="font-size:12px; opacity:0.8;">YouTube</span>
            </div>
            <div class="shortcut-item" onclick="quickNav('https://ndj-support.example.com')">
                <div class="icon-circle">🛠️</div>
                <span style="font-size:12px; opacity:0.8;">Suporte</span>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="goBack()">⬅️</div>
        <div class="nav-item" onclick="goHome()">🏠</div>
        <div class="nav-item" onclick="sharePage()">📤</div>
    </div>

    <div id="settings-modal">
        <div class="modal-header">
            <h2>Configurações</h2>
            <button onclick="toggleModal(false)" style="background:none; border:none; color:white; font-size:30px;">✕</button>
        </div>
        
        <div class="setting-item">
            <span>Bloqueio de Anúncios</span>
            <label class="switch">
                <input type="checkbox" id="adblock-toggle" onchange="updateAdblock()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <script>
        // Carrega AdBlock do Storage
        document.getElementById('adblock-toggle').checked = localStorage.getItem('adblock') === 'true';

        function navigate() {
            let val = document.getElementById('url-input').value.trim();
            if (!val) return;
            
            let url = val;
            if (!val.includes('.')) {
                url = 'https://www.google.com/search?q=' + encodeURIComponent(val);
            } else if (!val.startsWith('http')) {
                url = 'https://' + val;
            }
            window.location.href = url;
        }

        function quickNav(url) { window.location.href = url; }
        function goHome() { window.location.href = 'index.html'; }
        function goBack() { window.history.back(); }
        function toggleModal(show) { document.getElementById('settings-modal').style.display = show ? 'block' : 'none'; }
        
        function checkEnter(e) { if (e.key === 'Enter') navigate(); }

        function updateAdblock() {
            localStorage.setItem('adblock', document.getElementById('adblock-toggle').checked);
        }

        async function sharePage() {
            const data = { title: 'Ndj-lib Reborn', url: window.location.href };
            try {
                if (navigator.share) await navigator.share(data);
                else { alert("Copiado: " + data.url); navigator.clipboard.writeText(data.url); }
            } catch (err) { console.log(err); }
        }
    </script>
</body>
</html>
